<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CANJIA 네이버 로그인 처리</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-1.11.3.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js" crossorigin="anonymous"></script>
  <script src="https://static.nid.naver.com/js/naverLogin_implicit-1.0.3.js" charset="utf-8"></script>
  <script src="naver-config.js"></script>
</head>
<body class="callback-page">
  <main class="callback-card">
    <span class="brand-mark">N</span>
    <h1>네이버 로그인 처리 중</h1>
    <p id="callback-message">잠시만 기다려 주세요.</p>
  </main>

  <script>
    const API_BASE = (() => {
      if (window.location.protocol === "file:") {
        return "http://localhost:5000";
      }
      return window.location.origin;
    })();

    const message = document.querySelector("#callback-message");
    const config = window.NAVER_LOGIN_CONFIG || {};
    const isConfigured = config.clientId && config.clientId !== "YOUR_NAVER_CLIENT_ID";

    if (!isConfigured || typeof naver_id_login === "undefined") {
      message.textContent = "네이버 Client ID 설정을 먼저 완료해 주세요.";
    } else {
      const naverLogin = new naver_id_login(config.clientId, config.callbackUrl);

      window.handleNaverProfile = async function () {
        const profile = {
          provider: "naver",
          email: naverLogin.getProfileData("email") || "",
          nickname: naverLogin.getProfileData("nickname") || "",
          name: naverLogin.getProfileData("name") || "",
          profileImage: naverLogin.getProfileData("profile_image") || ""
        };

        // 로컬 스토리지에 저장
        localStorage.setItem("canjia_naver_profile", JSON.stringify(profile));

        // 백엔드에 프로필 저장
        try {
          await fetch(`${API_BASE}/api/profiles`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: profile.email,
              name: profile.name,
              nickname: profile.nickname,
              profileImage: profile.profileImage,
              interest: "",
              joined: new Date().toISOString()
            })
          });
        } catch (error) {
          console.error("프로필 저장 실패:", error);
        }

        if (window.opener) {
          const targetOrigin = window.location.protocol === "file:" ? "*" : window.location.origin;
          const payload = { type: "NAVER_LOGIN_SUCCESS", profile };
          // OAuth가 중첩 팝업이면 최상단(메인) 창까지 전달합니다.
          const visited = new Set();
          let w = window;
          for (let i = 0; i < 10; i++) {
            const parentWin = w.opener;
            if (!parentWin || parentWin.closed || visited.has(parentWin)) break;
            visited.add(parentWin);
            try {
              parentWin.postMessage(payload, targetOrigin);
            } catch {
              try {
                parentWin.postMessage(payload, "*");
              } catch (_) {
                break;
              }
            }
            w = parentWin;
          }
          message.textContent = "로그인이 완료되었습니다. 창을 닫는 중입니다.";
          window.close();
          return;
        }

        message.textContent = `${profile.nickname || profile.name || "네이버 사용자"}님, 로그인이 완료되었습니다.`;
      };

      naverLogin.get_naver_userprofile("handleNaverProfile()");
    }
  </script>
</body>
</html>
