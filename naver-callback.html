<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CANJIA 네이버 로그인 처리</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-1.11.3.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js" crossorigin="anonymous"></script>
  <script src="https://static.nid.naver.com/js/naverLogin_implicit-1.0.3.js" charset="utf-8"></script>
  <script src="naver-config.js"></script>
</head>
<body class="callback-page">
  <main class="callback-card">
    <span class="brand-mark">N</span>
    <h1>네이버 로그인 처리 중</h1>
    <p id="callback-message">잠시만 기다려 주세요.</p>
    <p id="debug-info" style="font-size: 0.8em; color: #999; margin-top: 1em;"></p>
  </main>

  <script>
    console.log("[Naver Callback] Page loaded");
    
    const API_BASE = (() => {
      if (window.location.protocol === "file:") {
        return "http://localhost:5000";
      }
      return window.location.origin;
    })();

    const message = document.querySelector("#callback-message");
    const debugInfo = document.querySelector("#debug-info");
    const config = window.NAVER_LOGIN_CONFIG || {};
    const isConfigured = config.clientId && config.clientId !== "YOUR_NAVER_CLIENT_ID";

    console.log("[Naver Callback] Config:", config);
    console.log("[Naver Callback] Is Configured:", isConfigured);

    if (!isConfigured) {
      message.textContent = "❌ 네이버 Client ID 설정을 먼저 완료해 주세요.";
      debugInfo.textContent = "naver-config.js를 확인하고 실제 Client ID를 입력하세요.";
      console.warn("[Naver Callback] Client ID not configured");
    } else if (typeof naver_id_login === "undefined") {
      message.textContent = "❌ 네이버 SDK를 로드하지 못했습니다.";
      debugInfo.textContent = "인터넷 연결을 확인해주세요.";
      console.warn("[Naver Callback] naver_id_login SDK not found");
    } else {
      console.log("[Naver Callback] Initializing naver_id_login");
      
      try {
        const naverLogin = new naver_id_login(config.clientId, config.callbackUrl);
        console.log("[Naver Callback] naver_id_login created");

        window.handleNaverProfile = async function () {
          console.log("[Naver Callback] handleNaverProfile called");
          
          try {
            const email = naverLogin.getProfileData("email");
            const nickname = naverLogin.getProfileData("nickname");
            const name = naverLogin.getProfileData("name");
            const profileImage = naverLogin.getProfileData("profile_image");
            
            console.log("[Naver Callback] Profile data:", { email, nickname, name, profileImage });

            if (!email && !nickname && !name) {
              throw new Error("네이버에서 프로필 정보를 받지 못했습니다.");
            }

            const profile = {
              provider: "naver",
              email: email || `naver_${Date.now()}@canjia.local`,
              nickname: nickname || name || "네이버 사용자",
              name: name || nickname || "",
              profileImage: profileImage || ""
            };

            console.log("[Naver Callback] Final profile:", profile);

            // 로컬 스토리지에 저장
            try {
              localStorage.setItem("canjia_naver_profile", JSON.stringify(profile));
              console.log("[Naver Callback] Profile saved to localStorage");
            } catch (e) {
              console.warn("[Naver Callback] localStorage save failed:", e);
            }

            // 백엔드에 프로필 저장
            try {
              const res = await fetch(`${API_BASE}/api/profiles`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  email: profile.email,
                  name: profile.name,
                  nickname: profile.nickname,
                  profileImage: profile.profileImage,
                  interest: "",
                  joined: new Date().toISOString()
                })
              });
              console.log("[Naver Callback] Backend save response:", res.status);
            } catch (error) {
              console.warn("[Naver Callback] Backend profile save failed:", error);
            }

            if (window.opener) {
              const targetOrigin = window.location.protocol === "file:" ? "*" : window.location.origin;
              const payload = { type: "NAVER_LOGIN_SUCCESS", profile };
              console.log("[Naver Callback] Sending message to opener");
              
              // OAuth가 중첩 팝업이면 최상단(메인) 창까지 전달합니다.
              const visited = new Set();
              let w = window;
              for (let i = 0; i < 10; i++) {
                const parentWin = w.opener;
                if (!parentWin || parentWin.closed || visited.has(parentWin)) break;
                visited.add(parentWin);
                try {
                  parentWin.postMessage(payload, targetOrigin);
                  console.log("[Naver Callback] Message sent to window level", i);
                } catch {
                  try {
                    parentWin.postMessage(payload, "*");
                  } catch (_) {
                    break;
                  }
                }
                w = parentWin;
              }
              message.textContent = "✅ 로그인이 완료되었습니다. 창을 닫는 중입니다.";
              console.log("[Naver Callback] Closing window");
              window.close();
              return;
            }

            message.textContent = `✅ ${profile.nickname}님, 로그인이 완료되었습니다.`;
            debugInfo.textContent = "메인 창으로 돌아가주세요.";
          } catch (error) {
            console.error("[Naver Callback] handleNaverProfile error:", error);
            message.textContent = `❌ 오류: ${error.message}`;
            debugInfo.textContent = "콘솔에서 자세한 오류를 확인해주세요.";
          }
        };

        console.log("[Naver Callback] Calling get_naver_userprofile");
        naverLogin.get_naver_userprofile("handleNaverProfile()");
      } catch (error) {
        console.error("[Naver Callback] Initialization error:", error);
        message.textContent = `❌ SDK 초기화 오류: ${error.message}`;
        debugInfo.textContent = "콘솔에서 자세한 오류를 확인해주세요.";
      }
    }
  </script>
</body>
</html>
