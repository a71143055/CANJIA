<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CANJIA 구글 로그인 처리</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="google-config.js"></script>
</head>
<body class="callback-page">
  <main class="callback-card">
    <span class="brand-mark">G</span>
    <h1>구글 로그인 처리 중</h1>
    <p id="callback-message">잠시만 기다려 주세요.</p>
  </main>

  <script>
    const API_BASE = (() => {
      if (window.location.protocol === "file:") {
        return "http://localhost:5000";
      }
      return window.location.origin;
    })();

    const message = document.querySelector("#callback-message");
    const config = window.GOOGLE_LOGIN_CONFIG || {};
    const isConfigured = config.clientId && config.clientId !== "YOUR_GOOGLE_CLIENT_ID";

    if (!isConfigured) {
      message.textContent = "구글 Client ID 설정을 먼저 완료해 주세요.";
    } else {
      // Google Identity Services 초기화
      window.onload = function () {
        google.accounts.id.initialize({
          client_id: config.clientId,
          callback: handleCredentialResponse
        });
      };

      async function handleCredentialResponse(response) {
        try {
          // JWT 토큰 디코드
          const base64Url = response.credential.split('.')[1];
          const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
          const jsonPayload = decodeURIComponent(
            atob(base64)
              .split('')
              .map((c) => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
              .join('')
          );
          const payload = JSON.parse(jsonPayload);

          const profile = {
            provider: "google",
            email: payload.email || "",
            name: payload.name || "",
            givenName: payload.given_name || "",
            familyName: payload.family_name || "",
            picture: payload.picture || ""
          };

          // 로컬 스토리지에 저장
          localStorage.setItem("canjia_google_profile", JSON.stringify(profile));

          // 백엔드에 프로필 저장
          await fetch(`${API_BASE}/api/profiles`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: profile.email,
              name: profile.name,
              nickname: profile.givenName || profile.name?.split(' ')[0] || "사용자",
              profileImage: profile.picture,
              interest: "",
              provider: "google",
              joined: new Date().toISOString()
            })
          });

          message.textContent = `${profile.name || profile.email}님, 로그인이 완료되었습니다.`;

          if (window.opener) {
            const targetOrigin = window.location.protocol === "file:" ? "*" : window.location.origin;
            window.opener.postMessage({ type: "GOOGLE_LOGIN_SUCCESS", profile }, targetOrigin);
            setTimeout(() => window.close(), 1500);
            return;
          }

          // 팝업이 아닌 경우 메인 페이지로 리디렉션
          setTimeout(() => {
            window.location.href = new URL(".", window.location.href).href;
          }, 1500);
        } catch (error) {
          console.error("로그인 오류:", error);
          message.textContent = "로그인 중 오류가 발생했습니다. 페이지를 새로고침해주세요.";
        }
      }

      // 팝업에서 Google ID 버튼 렌더링
      if (window.opener) {
        google.accounts.id.renderButton(
          document.body,
          { theme: "outline", size: "large" }
        );
      }
    }
  </script>
</body>
</html>
