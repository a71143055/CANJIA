<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CANJIA 마이크로소프트 로그인 처리</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://alcdn.msauth.net/browser/2.45.0/js/msal-browser.min.js"></script>
  <script src="ms-config.js"></script>
</head>
<body class="callback-page">
  <main class="callback-card">
    <span class="brand-mark">M</span>
    <h1>마이크로소프트 로그인 처리 중</h1>
    <p id="callback-message">잠시만 기다려 주세요.</p>
  </main>

  <script>
    const API_BASE = (() => {
      if (window.location.protocol === "file:") {
        return "http://localhost:5000";
      }
      return window.location.origin;
    })();

    const message = document.querySelector("#callback-message");
    const config = window.MS_LOGIN_CONFIG || {};
    const isConfigured = config.clientId && config.clientId !== "YOUR_MICROSOFT_CLIENT_ID";

    if (!isConfigured) {
      message.textContent = "마이크로소프트 Client ID 설정을 먼저 완료해 주세요.";
    } else {
      // MSAL 설정
      const msalConfig = {
        auth: {
          clientId: config.clientId,
          authority: config.authority,
          redirectUri: config.redirectUri
        },
        cache: {
          cacheLocation: "localStorage",
          storeAuthStateInCookie: true
        }
      };

      const msalInstance = new msal.PublicClientApplication(msalConfig);

      msalInstance.initialize().then(() => {
        // 리디렉션 처리 결과
        return msalInstance.handleRedirectPromise();
      }).then((response) => {
        if (response && response.account) {
          const account = response.account;
          const profile = {
            provider: "microsoft",
            email: account.username || account.localAccountId || "",
            name: account.name || "",
            id: account.localAccountId || "",
            givenName: account.idTokenClaims?.given_name || "",
            familyName: account.idTokenClaims?.family_name || ""
          };

          // 로컬 스토리지에 저장
          localStorage.setItem("canjia_ms_profile", JSON.stringify(profile));

          // 백엔드에 프로필 저장
          return fetch(`${API_BASE}/api/profiles`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: profile.email,
              name: profile.name || profile.givenName + " " + profile.familyName,
              nickname: profile.name || profile.email?.split("@")[0] || "사용자",
              profileImage: "",
              interest: "",
              provider: "microsoft",
              joined: new Date().toISOString()
            })
          }).then(() => {
            message.textContent = `${profile.name || profile.email}님, 로그인이 완료되었습니다.`;
            
            if (window.opener) {
              const targetOrigin = window.location.protocol === "file:" ? "*" : window.location.origin;
              window.opener.postMessage({ type: "MS_LOGIN_SUCCESS", profile }, targetOrigin);
              setTimeout(() => window.close(), 1500);
              return;
            }
            
            // 팝업이 아닌 경우 메인 페이지로 리디렉션
            setTimeout(() => {
              window.location.href = new URL(".", window.location.href).href;
            }, 1500);
          });
        } else {
          message.textContent = "로그인 처리 중입니다. 잠시만 기다려 주세요.";
        }
      }).catch((error) => {
        console.error("로그인 오류:", error);
        message.textContent = "로그인 중 오류가 발생했습니다. 페이지를 새로고침해주세요.";
      });
    }
  </script>
</body>
</html>
